# Langfuse self-hosted compose.
#
# This is a placeholder skeleton based on Langfuse v3 self-hosting docs:
#   https://langfuse.com/self-hosting/docker-compose
#
# Steps when actually starting this:
#   1. Generate secrets locally (openssl rand -hex 32) and fill in the placeholder
#      values below. Do NOT commit real secrets.
#   2. Run `docker compose -f infra/langfuse/compose.yaml up -d`.
#   3. Open http://localhost:3000, register an admin account, create a project.
#   4. Copy the project's publicKey + secretKey into the parent `.env`
#      (LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY).
#
# Notes:
#   - Langfuse v3 requires Postgres + ClickHouse + Redis + MinIO. Resource: ~1GB RAM.
#   - Pin image versions before relying on this in serious work.
#   - Adjust ports if 3000 / 5432 / 8123 collide with HotPulse compose.

services:
  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@langfuse-db:5432/postgres
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: redis
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minio123
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      # Replace these with locally generated secrets before running.
      NEXTAUTH_SECRET: 7a86a38378c17b5da942b9b60be7ab036cc244c10b2d28a2634d4e49e5eed88e
      SALT: bb93c687e64b876e4d485cf6b5cb234600ec036b3ece738aaad0beb098bda0bc
      ENCRYPTION_KEY: 2e67bd54d8bc6496f0b0acbb86b2469f2cfc0a6bbafa6d74f6a9069cb065f8db
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      LANGFUSE_INIT_ORG_ID: org_hotintel_local
      LANGFUSE_INIT_ORG_NAME: HotIntel Local
      LANGFUSE_INIT_PROJECT_ID: project_hotintel_brain_local
      LANGFUSE_INIT_PROJECT_NAME: hotintel-brain-local
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-local-hotintel-brain
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-local-446332a1a37a6568d348123a80443556fa914a219fc606ef
      LANGFUSE_INIT_USER_EMAIL: lumingfan+langfuse@local.dev
      LANGFUSE_INIT_USER_NAME: lumingfan
      LANGFUSE_INIT_USER_PASSWORD: LangfuseLocal!2026

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@langfuse-db:5432/postgres
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: redis
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minio123
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      SALT: bb93c687e64b876e4d485cf6b5cb234600ec036b3ece738aaad0beb098bda0bc
      ENCRYPTION_KEY: 2e67bd54d8bc6496f0b0acbb86b2469f2cfc0a6bbafa6d74f6a9069cb065f8db
      TELEMETRY_ENABLED: "false"

  langfuse-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server

  langfuse-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse-minio:
    image: cgr.dev/chainguard/minio
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9090:9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
    volumes:
      - langfuse-minio-data:/data

volumes:
  langfuse-db-data:
  clickhouse-data:
  clickhouse-logs:
  langfuse-minio-data:
